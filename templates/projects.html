{% extends "base.html" %}

{% block content %}
<section class="projects">
    <h1>Projekter</h1>
    <ul>
        {% for project in projects %}
        <li class="project-card">
            <h2>{{ project.title }}</h2>
            <p>{{ project.description }}</p>
            <img src="{{ project.image }}" alt="{{ project.title }} image">
        </li>
        {% endfor %}
    </ul>
</section>
{% endblock %}

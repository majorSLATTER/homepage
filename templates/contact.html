{% extends "base.html" %}

{% block content %}
<section class="contact">
    <div class="container">
        <h1>Kontakt</h1>
        <p class="contact-intro">Jeg ser gerne høre fra dig! Brug formularen nedenfor, eller send mig en e-mail direkte.</p>
        
        <form class="contact-form" method="POST" action="/contact">
            <div class="form-group">
                <label for="name">Navn *</label>
                <input type="text" id="name" name="name" required placeholder="Dit navn">
            </div>
            
            <div class="form-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" required placeholder="din.email@eksempel.dk">
            </div>
            
            <div class="form-group">
                <label for="subject">Emne *</label>
                <input type="text" id="subject" name="subject" required placeholder="Hvad handler det om?">
            </div>
            
            <div class="form-group">
                <label for="message">Besked *</label>
                <textarea id="message" name="message" required rows="6" placeholder="Din besked her..."></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Send Besked</button>
        </form>
        
        <div class="contact-direct">
            <h3>Eller kontakt mig direkte</h3>
            <p>E-mail: <a href="mailto:sune.skovmand@gmail.com">sune.skovmand@gmail.com</a></p>
        </div>
    </div>
</section>
{% endblock %}

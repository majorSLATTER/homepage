<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sune Skovmand</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}" type="image/x-icon">
    <script defer>
        window.addEventListener('load', function() {
            const darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'enabled') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkmode-slider').checked = true;
            }
            
            // Intersection Observer for slide-in animations
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };
            
            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const animation = entry.target.dataset.animation;
                        entry.target.style.animation = animation;
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);
            
            // Observe project cards
            const projectCards = document.querySelectorAll('.project-card');
            projectCards.forEach((card, index) => {
                const slideDirection = index % 2 === 0 ? 'slideInLeft' : 'slideInRight';
                card.dataset.animation = `${slideDirection} 0.6s ease-out forwards`;
                card.style.opacity = '0';
                observer.observe(card);
            });
            
            // Observe about cards
            const aboutCards = document.querySelectorAll('.about-card');
            aboutCards.forEach((card, index) => {
                const slideDirection = index % 2 === 0 ? 'slideInLeft' : 'slideInRight';
                card.dataset.animation = `${slideDirection} 0.6s ease-out forwards`;
                card.style.opacity = '0';
                observer.observe(card);
            });
        });
    </script>
</head>
<body>
    <header>
        <a href="/"><img src="{{ url_for('static', filename='img/logo.png') }}" alt="Sune Skovmand neon logo: stylized purple and black design featuring two mirrored figures with curved forms and glowing neon outline effect" id="logo"></a>
        <nav>
            <ul>
                <li><a href="/projects/">Projekter</a></li>
                <li><a href="/about/">Om Mig</a></li>
                <li><a href="/contact/">Kontakt</a></li>
            </ul>
            <div class="nav-separator"></div>
            <label for="darkmode-slider" class="switch">
                <input type="checkbox" name="darkmode" id="darkmode-slider">
                <span class="slider"></span>
                <script>
                    const darkmodeSlider = document.getElementById('darkmode-slider');
                    darkmodeSlider.addEventListener('change', function() {
                        document.body.classList.toggle('dark-mode', this.checked);
                        localStorage.setItem('darkMode', this.checked ? 'enabled' : 'disabled');
                    });
                </script>
            </label>
        </nav>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer>
        <p>Mail: sune.skovmand@gmail.com</p>
        <p>Telefon: +45 25 61 68 85</p>
        <p>Adresse: Klingenberg 15C, 3. th, 5000 Odense C, Danmark</p>
    </footer>
</body>
</html>
